// 1. Write pseudo code (meaning; use comments) to describe how you would
//    implement the append method. HINT: What two scenarios can you distinguish?
// PSEUDO CODE:
// 1. Create a new node
// 2. If head is null, set head to new node
// 3. Otherwise, traverse to the last node
// 4. Set last node's next pointer to new node
// 5. Increase length

// 2. Translate your pseudo code into actual code and test it.
//    HINT: Use list.print() to test your code.
this.append = function(element) {
  var node = new Node(element);

  if (head === null) {
    head = node;
  } else {
    var current = head;

    while (current.next !== null) {
      current = current.next;
    }

    current.next = node;
  }

  length++;
};


// 3. Repeat (1) and (2) for insert.
this.insert = function(position, element) {
  if (position < 0 || position > length) return false;

  var node = new Node(element);
  var current = head;
  var previous;
  var index = 0;

  if (position === 0) {
    node.next = head;
    head = node;
  } else {
    while (index++ < position) {
      previous = current;
      current = current.next;
    }

    node.next = current;
    previous.next = node;
  }

  length++;
  return true;
};
// 1. Check if position is valid
// 2. Create new node
// 3. If position is 0, insert at head
// 4. Otherwise traverse to position
// 5. Reconnect pointers
// 6. Increase length

// 4. Repeat (1) and (2) for removeAt.
// 1. Check if position is valid
// 2. If position is 0, move head
// 3. Otherwise traverse list
// 4. Skip over node
// 5. Decrease length
this.removeAt = function(position) {
  if (position < 0 || position >= length) return null;

  var current = head;
  var previous;
  var index = 0;

  if (position === 0) {
    head = current.next;
  } else {
    while (index++ < position) {
      previous = current;
      current = current.next;
    }

    previous.next = current.next;
  }

  length--;
  return current.element;
};


// 5. Repeat (1) and (2) for remove.
// 1. Find index of element
// 2. Use removeAt to delete it
this.remove = function(element) {
  var index = this.indexOf(element);
  return this.removeAt(index);
};


// 6. Repeat (1) and (2) for indexOf.
// 1. Start at head
// 2. Traverse list
// 3. Compare each element
// 4. Return index if found
// 5. Return -1 if not found

this.indexOf = function(element) {
  var current = head;
  var index = 0;

  while (current) {
    if (current.element === element) return index;

    current = current.next;
    index++;
  }

  return -1;
};


// 7. Repeat (1) and (2) for isEmpty.

};
