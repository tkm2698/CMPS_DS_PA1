function Stack() {
function Stack() {
  var items = [];

  this.push = function(element) {
    items.push(element);
  };

  this.pop = function() {
    return items.pop();
  };

  this.peek = function() {
    return items[items.length - 1];
  };

  this.isEmpty = function() {
    return items.length === 0;
  };

  this.size = function() {
    return items.length;
  };

  this.print = function() {
    console.log(items.toString());
  };
}
}

function Queue() {
function Queue() {
  var items = [];

  this.enqueue = function(element) {

  this.dequeue = function() {

// The priority queue //

console.log("The priority queue");

// The following class is used below.

function QueueElement(element, priority) {
  this.element = element;
  this.priority = priority;
}

// 1. Finish the implementation below for the priority queue. Note that this
//    implementation does not use the prototype.

function PriorityQueue() {
  var items = [];

  this.enqueue = function(element, priority) {
    var queueElement = new QueueElement(element, priority);

    var added = false;

    for (var i = 0; i < items.length; i++) {
      if (queueElement.priority < items[i].priority) {
        items.splice(i, 0, queueElement);
        added = true;
        break;
      }
    }

    if (!added) {
      items.push(queueElement);
    }
  };

  this.dequeue = function() {
    return items.shift();
  };

  this.front = function() {
    return items[0];
  };

  this.isEmpty = function() {
    return items.length === 0;
  };

  this.size = function() {
    return items.length;
  };

  this.print = function() {
    for (var i = 0; i < items.length; i++) {
      console.log(`${items[i].element} - ${items[i].priority}`);
    }
  };
}

function hotPotato(nameList, num) {
  // create a queue to store the names
  function hotPotato(nameList, num) {
  var queue = new Queue();

  // add the names to the queue
  for (var i = 0; i < nameList.length; i++) {
    queue.enqueue(nameList[i]);
  }

  // while there is more that one name in the queue
  // dequeue and enqueue a name num times
    while (queue.size() > 1) {

    // pass potato num times
    for (var j = 0; j < num; j++) {
      queue.enqueue(queue.dequeue());
    }
  // then dequeue one more time, which is the participant that is ejected
      console.log(queue.dequeue() + " was eliminated");
  }
  // /while (end of while loop)
  return queue.dequeue();
}
  // the person that remains in the queue wins
  return queue.dequeue();
}
