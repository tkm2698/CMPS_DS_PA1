// 1. Implement the linked list data structure using the prototype.

function LinkedList() {
  function LinkedList() {
  this.head = null;
  this.length = 0;
}

// Node helper
function Node(element) {
  this.element = element;
  this.next = null;
}
}

// add the prototype methods
LinkedList.prototype.append = function(element) {
  var node = new Node(element);

  if (this.head === null) {
    this.head = node;
  } else {
    var current = this.head;

    while (current.next !== null) {
      current = current.next;
    }

    current.next = node;
  }

  this.length++;
};
LinkedList.prototype.print = function() {
  var current = this.head;
  var result = "List: ";

  while (current) {
    result += current.element + (current.next ? " -> " : "");
    current = current.next;
  }

  console.log(result);
};
LinkedList.prototype.getNodeAt = function(position) {
  if (position < 0 || position >= this.length) return null;

  var current = this.head;
  var index = 0;

  while (index < position) {
    current = current.next;
    index++;
  }

  return current; // returns NODE (not element)
};

LinkedList.prototype.appendNode = function(node) {
  if (this.head === null) {
    this.head = node;
  } else {
    var current = this.head;

    while (current.next !== null) {
      current = current.next;
    }

    current.next = node;
  }

  this.length++;
};

// 4. Implement an appendNode(node) method (using the prototype) that appends a
//    node to a linked list (as opposed to an element!).
// Appends an existing NODE (not a value) to the end of the list.

LinkedList.prototype.appendNode = function(node) {

  if (!node) return;

  // CASE 1: empty list
  if (this.head === null) {
    this.head = node;
  } else {

    // CASE 2: traverse to last node
    var current = this.head;

    while (current.next !== null) {
      current = current.next;
    }

    current.next = node;
  }

  this.length++;
};
