//    (b) Implement a greedy search that finds the shortest path. You should
//        have the following steps: (1) pick node A as the starting position,
//        (2) pick the closest neighbor that has not been visited as the next
//        city to visit, (3) continue this process until returning to A,
//        (4) print the final length of the path and also the sequence of
//        the cities.
function greedyTSP(graph, start) {
  var visited = {};
  var path = [start];
  var totalDistance = 0;

  var current = start;
  visited[current] = true;

  while (path.length < Object.keys(graph).length) {
    var nextCity = null;
    var minDistance = Infinity;

    for (var city in graph[current]) {
      if (!visited[city] && graph[current][city] < minDistance) {
        minDistance = graph[current][city];
        nextCity = city;
      }
    }

    visited[nextCity] = true;
    path.push(nextCity);
    totalDistance += minDistance;
    current = nextCity;
  }

  // return to start
  totalDistance += graph[current][start];
  path.push(start);

  console.log("Path:", path.join(" -> "));
  console.log("Total distance:", totalDistance);

  return totalDistance;
}
