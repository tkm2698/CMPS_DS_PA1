function Node(key) {

function BinarySearchTree() {
  this.root = null;
}

BinarySearchTree.prototype._insertNode = function(node, newNode) {
  if (newNode.key < node.key) {
    if (node.left === null) {
      node.left = newNode;
    } else {
      this._insertNode(node.left, newNode);
    }
  } else {
    if (node.right === null) {
      node.right = newNode;
    } else {
      this._insertNode(node.right, newNode);
    }
  }
};

// insert
BinarySearchTree.prototype.insert = function(key) {
  var newNode = new Node(key);

  if (this.root === null) {
    this.root = newNode;
  } else {
    this._insertNode(this.root, newNode);
  }
};

// in-order traversal helper

  if (node !== null) {
    this._inOrderTraverseNode(node.left, callback);

// 7. Implement the search method using the prototype and show that it works.
BinarySearchTree.prototype.search = function(key) {
  var current = this.root;

  while (current !== null) {
    if (key === current.key) {
      return true;
    }

    if (key < current.key) {
      current = current.left;
    } else {
      current = current.right;
    }
  }

  return false;
};

// 12 Implement the graph data structure using the prototype.
function Graph() {
  this.adjacencyList = {};
}

// add vertex (node)
Graph.prototype.addVertex = function(vertex) {
  if (!this.adjacencyList[vertex]) {
    this.adjacencyList[vertex] = [];
  }
};

// add edge (connection)
Graph.prototype.addEdge = function(v1, v2) {
  this.adjacencyList[v1].push(v2);
  this.adjacencyList[v2].push(v1); // undirected graph
};

// remove edge
Graph.prototype.removeEdge = function(v1, v2) {
  this.adjacencyList[v1] = this.adjacencyList[v1].filter(v => v !== v2);
  this.adjacencyList[v2] = this.adjacencyList[v2].filter(v => v !== v1);
};

// remove vertex
Graph.prototype.removeVertex = function(vertex) {
  while (this.adjacencyList[vertex].length) {
    var adjacentVertex = this.adjacencyList[vertex].pop();
    this.removeEdge(vertex, adjacentVertex);
  }
  delete this.adjacencyList[vertex];
};

// print graph
Graph.prototype.print = function() {
  console.log(this.adjacencyList);
};

// 13 Implement Prim's algorithm (use code from the book).
//    NOTE1: You do not need to use the code from (12) for this question.
//    NOTE2: Replace INF (used in the book) with Infinity.
function Graph() {
  this.INF = Infinity;
}

Graph.prototype.primMST = function(graph) {
  var vertices = graph.length;
  var parent = [];
  var key = [];
  var mstSet = [];

  // initialize arrays
  for (var i = 0; i < vertices; i++) {
    key[i] = Infinity;
    mstSet[i] = false;
  }

  key[0] = 0;
  parent[0] = -1;

  for (var count = 0; count < vertices - 1; count++) {
    var min = Infinity;
    var u = -1;

    // pick minimum key vertex not in MST
    for (var v = 0; v < vertices; v++) {
      if (mstSet[v] === false && key[v] < min) {
        min = key[v];
        u = v;
      }
    }

    mstSet[u] = true;

    // update adjacent vertices
    for (var v = 0; v < vertices; v++) {
      if (
        graph[u][v] !== 0 &&
        mstSet[v] === false &&
        graph[u][v] < key[v]
      ) {
        parent[v] = u;
        key[v] = graph[u][v];
      }
    }
  }

  return parent;
};
// 14 Show that your code works using the example from the book in the minimum

Graph.prototype.printMST = function(graph, parent) {

  for (var i = 1; i < graph.length; i++) {
    console.log(parent[i] + " - " + i + "\t" + graph[i][parent[i]]);
  }
};
