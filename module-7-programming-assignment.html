// 1. Implement fibonnacci using a recursive function and test your code.
function fibonacci(n) {
  if (n === 0) return 0;
  if (n === 1) return 1;

  return fibonacci(n - 1) + fibonacci(n - 2);
}

console.log("Fibonacci test:");

console.log(fibonacci(1)); // 1
console.log(fibonacci(2)); // 1
console.log(fibonacci(5)); // 5

console.log("Dynamic programming");

// 1. Implement the minimum coin change problem using dynamic programming.
//    Test your code.
function minCoinChange(coins, amount) {
  var dp = [];

  // initialize dp array with Infinity
  for (var i = 0; i <= amount; i++) {
    dp[i] = Infinity;
  }

  dp[0] = 0; // base case

  for (var i = 1; i <= amount; i++) {
    for (var j = 0; j < coins.length; j++) {
      if (coins[j] <= i) {
        dp[i] = Math.min(dp[i], dp[i - coins[j]] + 1);
      }
    }
  }

  return dp[amount];
}

var coins = [1, 5, 10, 25];

console.log("Test 1 (amount 11):");
console.log(minCoinChange(coins, 11)); // expected: 2 (10 + 1)

console.log("Test 2 (amount 30):");
console.log(minCoinChange(coins, 30)); // expected: 2 (25 + 5)

// Greedy algorithms //
//-------------------//
console.log("Greedy algorithms");

// 1. Implement the minimum coin change problem using a greedy algorithm.
//    Test your code.
function greedyCoinChange(coins, amount) {
  var result = [];
  var remaining = amount;

  // sort coins largest → smallest
  coins.sort(function(a, b) {
    return b - a;
  });

  for (var i = 0; i < coins.length; i++) {
    while (remaining >= coins[i]) {
      remaining -= coins[i];
      result.push(coins[i]);
    }
  }

  return result;
}

var coins = [1, 5, 10, 25];

console.log("Greedy result for 11:");
console.log(greedyCoinChange(coins, 11));

console.log("Greedy result for 30:");
console.log(greedyCoinChange(coins, 30));

// 1. Solve the problem of obtaining all the positive numbers in an array using

var numbers = [-3, 5, 0, 12, -7, 8, -1, 4];

var positives = [];

for (var i = 0; i < numbers.length; i++) {
  if (numbers[i] > 0) {
    positives.push(numbers[i]);
  }
}

console.log(positives);
// 2. Solve the problem of obtaining all the positive numbers in an array using
//    functional style.
var numbers = [-3, 5, 0, 12, -7, 8, -1, 4];

var positives = numbers.filter(function(num) {
  return num > 0;
});
